name: Build Site

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - run: npm ci
      - name: Build site
        env:
          INDEXNOW_KEY: ${{ secrets.INDEXNOW_KEY }}
          SITE_DOMAIN: ${{ secrets.SITE_DOMAIN || vars.SITE_DOMAIN || 'kuailian-letsv.com' }}
          REQUIRE_INDEXNOW_KEY: ${{ secrets.INDEXNOW_KEY != '' && '1' || '' }}
        run: npm run build
      - uses: actions/upload-artifact@v4
        with:
          name: kuailian-site
          path: _site
