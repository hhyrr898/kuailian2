name: Gemini Auto Content Updater

on:
  schedule:
    - cron: "12 0 * * *"

  workflow_dispatch:
    inputs:
      post_count:
        description: "本次手动测试生成的文章数量（可選 1-9，不填寫默認 1 篇）"
        required: true
        default: "1"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  TZ: "Asia/Hong_Kong"

permissions:
  contents: write

jobs:
  build-and-post:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm

      - name: Install Dependencies
        run: npm ci

      - name: Run Gemini Content Generator
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: node autobot.js ${{ github.event.inputs.post_count || '1' }}

      - name: Build Eleventy Site
        env:
          INDEXNOW_KEY: ${{ secrets.INDEXNOW_KEY }}
          SITE_DOMAIN: ${{ secrets.SITE_DOMAIN || vars.SITE_DOMAIN || 'kuailian-letsv.com' }}
          REQUIRE_INDEXNOW_KEY: "1"
        run: |
          chmod -R +x ./node_modules/.bin/ 2>/dev/null || true
          npm run build

      - name: Verify IndexNow key file (local build output)
        env:
          INDEXNOW_KEY: ${{ secrets.INDEXNOW_KEY }}
        run: node scripts/verify-indexnow-key.mjs

      - name: Commit and Push Changes back to Repo
        env:
          INDEXNOW_KEY: ${{ secrets.INDEXNOW_KEY }}
        run: |
          git config --global user.name "Gemini-Content-Bot"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/posts/ src/keywords.json
          if [ -n "$INDEXNOW_KEY" ] && [ -f "src/${INDEXNOW_KEY}.txt" ]; then
            git add "src/${INDEXNOW_KEY}.txt"
          fi
          if ! git diff --cached --quiet; then
            git commit -m "🤖 [Bot] 自动同步：更新文章、词库与 IndexNow 验证文件"
            git push
            echo "已推送新文章到 GitHub"
          else
            echo "无文件变更，跳过推送"
          fi

      - name: Wait for Cloudflare Pages deploy (IndexNow txt)
        env:
          INDEXNOW_KEY: ${{ secrets.INDEXNOW_KEY }}
          SITE_DOMAIN: ${{ secrets.SITE_DOMAIN || vars.SITE_DOMAIN || 'kuailian-letsv.com' }}
          INDEXNOW_HOST: ${{ secrets.INDEXNOW_HOST }}
        run: |
          echo "等待 Pages 同步验证文件（最多约 3 分钟）..."
          for i in $(seq 1 36); do
            if node scripts/verify-indexnow-key.mjs --online; then
              echo "线上验证文件已就绪"
              exit 0
            fi
            echo "第 ${i}/36 次检查未通过，10 秒后重试..."
            sleep 10
          done
          echo "线上验证文件仍未就绪，请检查 Cloudflare Pages 是否配置 INDEXNOW_KEY 并完成部署"
          exit 1

      - name: Push URLs to Bing IndexNow
        env:
          INDEXNOW_KEY: ${{ secrets.INDEXNOW_KEY }}
          SITE_DOMAIN: ${{ secrets.SITE_DOMAIN || vars.SITE_DOMAIN || 'kuailian-letsv.com' }}
          INDEXNOW_HOST: ${{ secrets.INDEXNOW_HOST }}
          PUSH_NEW_ONLY: "1"
        run: node scripts/bing-indexnow-push.mjs
