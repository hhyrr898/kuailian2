name: Bing IndexNow Full Site Push

on:
  workflow_dispatch:

env:
  TZ: Asia/Hong_Kong

jobs:
  push-full:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm

      - run: npm ci

      - name: Build site
        env:
          INDEXNOW_KEY: ${{ secrets.INDEXNOW_KEY }}
          SITE_DOMAIN: ${{ secrets.SITE_DOMAIN || vars.SITE_DOMAIN || 'kuailian-letsv.com' }}
          REQUIRE_INDEXNOW_KEY: "1"
        run: npm run build

      - name: Verify IndexNow key online
        env:
          INDEXNOW_KEY: ${{ secrets.INDEXNOW_KEY }}
          SITE_DOMAIN: ${{ secrets.SITE_DOMAIN || vars.SITE_DOMAIN || 'kuailian-letsv.com' }}
          INDEXNOW_HOST: ${{ secrets.INDEXNOW_HOST }}
        run: node scripts/verify-indexnow-key.mjs --online

      - name: Push all URLs to Bing
        env:
          INDEXNOW_KEY: ${{ secrets.INDEXNOW_KEY }}
          SITE_DOMAIN: ${{ secrets.SITE_DOMAIN || vars.SITE_DOMAIN || 'kuailian-letsv.com' }}
          INDEXNOW_HOST: ${{ secrets.INDEXNOW_HOST }}
          PUSH_NEW_ONLY: "0"
        run: node scripts/bing-indexnow-push.mjs
